<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pengaturan - MySurat</title>
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
  <div class="container-fluid">
    <a class="navbar-brand" href="{{ url_for('dashboard') }}">MySurat</a>
    <ul class="navbar-nav ms-auto">
      <li class="nav-item"><span class="nav-link">Hi, {{ session['username'] }}</span></li>
      <li class="nav-item"><a class="nav-link" href="{{ url_for('logout') }}">Logout <i class="bi bi-box-arrow-right"></i></a></li>
    </ul>
  </div>
</nav>
<div class="container mt-4">
    <h3>Pengaturan Akun</h3>
    <form method="POST" class="shadow-sm p-4 rounded bg-white">
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" class="form-control rounded" name="username" value="{{ session['username'] }}">
        </div>
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control rounded" name="email" value="{{ session['email'] }}">
        </div>
        <div class="mb-3">
            <label class="form-label">Password Baru</label>
            <input type="password" class="form-control rounded" name="password">
        </div>
        <button type="submit" class="btn btn-dark rounded"><i class="bi bi-save"></i> Simpan</button>
    </form>
</div>
</body>
</html>
