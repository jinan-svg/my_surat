<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - My Surat</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <script defer src="{{ url_for('static', filename='js/script.js') }}"></script>
</head>
<body>

    <div class="page-wrapper register-wrapper">

        <div class="register-card">

            <a href="{{ url_for('login') }}" class="back-btn">
                <i class="fa-solid fa-arrow-left"></i>
            </a>

            <h1 class="register-title">Register</h1>

            <form class="register-form" method="POST">

                <div class="input-box">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" name="nama" placeholder="Masukkan Nama Lengkap Anda" required>
                </div>

                <div class="input-box">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" name="email" placeholder="Masukkan Nama Lengkap Anda" required>
                </div>

                <div class="input-box">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" name="password" placeholder="Masukkan Password" required>
                </div>

                <div class="input-box">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" name="konfirmasi" placeholder="Konfirmasi Password" required>
                </div>

                <button type="submit" class="btn-register">Masuk</button>

            </form>

        </div>

    </div>

</body>
</html>
