<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Tolak Surat - My Surat</title>

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="surat-baru-frame">

    <div class="surat-baru-topbar">
        <a href="{{ url_for('pengajuan') }}" class="surat-back">
            <i class="fa-solid fa-arrow-left"></i>
        </a>

        <div>
            <h2>TOLAK SURAT</h2>
            <p>berikan alasan penolakan surat</p>
        </div>

        <div class="surat-user-icon">
            <i class="fa-solid fa-user"></i>
        </div>
    </div>

    <div class="surat-baru-content">

        <h1 class="surat-page-title">Alasan Penolakan</h1>
        <p class="surat-page-subtitle">Catatan ini akan dilihat user untuk memperbaiki surat</p>

        <div class="detail-card">
            <div class="detail-row">
                <span>No. Surat</span>
                <strong>{{ surat.nomor_surat }}</strong>
            </div>

            <div class="detail-row">
                <span>Perihal</span>
                <strong>{{ surat.perihal }}</strong>
            </div>

            <div class="detail-row">
                <span>Tujuan</span>
                <strong>{{ surat.tujuan }}</strong>
            </div>
        </div>

        <form method="POST" class="form-surat-baru">

            <label>Catatan Penolakan / Revisi</label>
            <textarea name="catatan" placeholder="Contoh: Perbaiki tanggal surat dan tujuan surat..." required></textarea>

            <button type="submit" class="btn-tolak-submit">
                <i class="fa-solid fa-circle-xmark"></i>
                Tolak Surat
            </button>

        </form>

    </div>

</div>

</body>
</html>
